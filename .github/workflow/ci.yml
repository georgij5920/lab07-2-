name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cmake_args: -DCMAKE_CXX_COMPILER=g++
          - os: ubuntu-latest
            compiler: clang
            cmake_args: -DCMAKE_CXX_COMPILER=clang++
          - os: windows-latest
            compiler: msvc
            cmake_args: ''
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        shell: bash
        run: cmake -S . -B _build -DBUILD_TESTS=ON -DCMAKE_INSTALL_PREFIX=_install ${{ matrix.cmake_args }}
      - name: Build
        run: cmake --build _build --config Release --parallel
      - name: Test
        run: ctest --test-dir _build --build-config Release --output-on-failure
      - name: Install
        run: cmake --build _build --config Release --target install

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gcovr
        run: python3 -m pip install gcovr
      - name: Configure with coverage
        run: cmake -S . -B _build -DBUILD_TESTS=ON -DBUILD_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=g++
      - name: Build
        run: cmake --build _build --parallel
      - name: Test
        run: ctest --test-dir _build --output-on-failure
      - name: Check banking coverage
        run: gcovr --root . --filter '.*banking/.*' --exclude '.*tests/.*' --fail-under-line 90 --print-summary

  package:
    name: Package / ${{ matrix.os }}
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            generators: TGZ
            artifact: linux-packages
          - os: macos-latest
            generators: TGZ
            artifact: macos-packages
          - os: windows-latest
            generators: ZIP
            artifact: windows-packages
    steps:
      - uses: actions/checkout@v4
      - name: Configure package build
        shell: bash
        run: cmake -S . -B _build -DCMAKE_BUILD_TYPE=Release -DCPACK_GENERATOR="${{ matrix.generators }}"
      - name: Build
        run: cmake --build _build --config Release --parallel
      - name: Build packages
        run: cmake --build _build --config Release --target package
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          find _build -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} artifacts/ \;
          ls -la artifacts
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/*

  release:
    name: Publish release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
